version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: omega_world_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: omega_world
      POSTGRES_USER: postgres
      # استخدمنا trust عشان يطابق الباسورد الفاضي اللي عملناه في الـ .env
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - omega_pg_data:/var/lib/postgresql/data

volumes:
  omega_pg_data:
